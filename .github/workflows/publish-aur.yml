name: Publish AUR Package

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  publish-aur:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          {
            echo 'GIT_SSH_COMMAND=ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes'
          } >> "$GITHUB_ENV"

      - name: Clone AUR repo
        run: git clone aur@aur.archlinux.org:cctui.git aur-repo

      - name: Update PKGBUILD and .SRCINFO
        run: |
          set -euo pipefail
          chmod +x scripts/update-aur.sh
          ./scripts/update-aur.sh \
            --tag "${GITHUB_REF_NAME}" \
            --aur-dir "$PWD/aur-repo"

      - name: Commit and push to AUR
        run: |
          set -euo pipefail
          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update to ${GITHUB_REF_NAME#v}"
          git push
